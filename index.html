<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Calorie Tracker</title>
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calories">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    color-scheme: dark;
    --bg: #0d0d0f;
    --card: #18181b;
    --border: #2a2a2e;
    --text: #f2f2f3;
    --muted: #8b8b92;
    --accent: #34c759;
    --protein: #4da3ff;
    --warn: #ff8c42;
    --danger: #ff453a;
    --progress-base: #f2a541;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    overscroll-behavior-y: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 10px) 16px 8px;
  }
  .tabs { display: flex; gap: 6px; background: var(--card); padding: 4px; border-radius: 10px; }
  .tab {
    border: none; background: transparent; color: var(--muted);
    font-size: 14px; font-weight: 600; padding: 6px 14px; border-radius: 8px;
  }
  .tab.active { background: var(--accent); color: #04210c; }
  .icon-btn {
    border: none; background: var(--card); color: var(--text);
    width: 38px; height: 38px; border-radius: 10px; font-size: 18px;
  }
  .view { flex: 1; overflow-y: auto; padding: 0 16px; -webkit-overflow-scrolling: touch; }
  .view.hidden { display: none; }

  .backup-banner {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: rgba(255,140,66,0.12); border: 1px solid var(--warn); color: var(--warn);
    border-radius: 10px; padding: 10px 12px; font-size: 13px; margin: 8px 0 0;
  }
  .backup-banner.hidden { display: none; }
  .backup-banner button {
    border: none; background: var(--warn); color: #2b1400; font-weight: 700;
    border-radius: 8px; padding: 6px 10px; font-size: 12px; white-space: nowrap; flex: 0 0 auto;
  }
  .backup-warning-note { font-size: 11px; color: var(--muted); margin: -6px 0 16px; line-height: 1.4; }
  .total-block { text-align: center; padding: 8px 0 14px; }
  .total-num { font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
  .total-sub { color: var(--muted); font-size: 14px; margin-top: 2px; }
  .protein-sub { color: var(--protein); font-size: 17px; margin-top: 4px; font-weight: 600; }
  .date-label { color: var(--muted); font-size: 13px; margin-bottom: 2px; }

  .progress-wrap { margin: 10px 0 4px; }
  .progress-wrap.hidden { display: none; }
  .progress-track { height: 8px; background: var(--card); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--progress-base); border-radius: 4px; transition: width .2s ease; }
  .progress-bar.warn { background: var(--warn); }
  .progress-bar.over { background: var(--danger); }
  .progress-label { text-align: center; font-size: 12px; color: var(--muted); margin-top: 6px; }

  ul { list-style: none; margin: 0; padding: 0; }
  .entries-list { margin-top: 8px; padding-bottom: 12px; }
  .entry {
    background: var(--card); border-radius: 12px; padding: 12px;
    margin-bottom: 8px; cursor: pointer;
  }
  .entry:active { background: #222226; }
  .entry-row { display: flex; align-items: center; gap: 10px; }
  .entry-amount { font-weight: 700; font-size: 16px; white-space: nowrap; }
  .entry-amount .ea-pro { color: var(--protein); font-size: 14px; margin-left: 3px; }
  .entry-amount .ea-unit { color: var(--muted); font-weight: 500; font-size: 13px; margin-left: 4px; }
  .entry-name { flex: 1; color: var(--muted); font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-time { color: var(--muted); font-size: 12px; }
  .entry-del {
    border: none; background: transparent; color: var(--muted);
    font-size: 20px; width: 32px; height: 32px; line-height: 1; flex: 0 0 auto;
  }
  .entry-detail { display: none; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
  .entry.expanded .entry-detail { display: flex; }
  .entry-detail-pro { color: var(--protein); font-weight: 600; font-size: 14px; }
  .entry-edit { border: none; background: transparent; color: var(--accent); font-weight: 600; font-size: 14px; padding: 4px 8px; margin-left: auto; }
  .empty { color: var(--muted); text-align: center; padding: 24px 0; font-size: 14px; }

  .bottom-bar {
    padding: 8px 16px calc(env(safe-area-inset-bottom) + 10px);
    background: var(--bg); border-top: 1px solid var(--border);
  }
  .quick-items { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
  .quick-items.hidden { display: none; }
  .quick-item-chip {
    flex: 0 0 auto; text-align: left; border: 1px solid var(--border); background: var(--card);
    color: var(--text); border-radius: 14px; padding: 8px 12px; font-size: 13px; font-weight: 600;
  }
  .quick-item-chip .qi-stats { display: block; color: var(--muted); font-size: 11px; font-weight: 500; margin-top: 2px; }
  .add-bar { display: flex; flex-direction: column; gap: 8px; }
  .add-row { display: flex; gap: 8px; }
  .add-bar input {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 12px; padding: 14px; font-size: 17px; min-width: 0; flex: 1;
  }
  .add-bar input#calInput { font-weight: 700; }
  input.invalid { border-color: var(--danger); }
  .add-bar button {
    border: none; background: var(--accent); color: #04210c;
    font-weight: 700; font-size: 17px; padding: 0 22px; border-radius: 12px; flex: 0 0 auto;
  }

  .history-day { background: var(--card); border-radius: 12px; margin: 10px 0; overflow: hidden; }
  .history-header {
    display: flex; justify-content: space-between; padding: 14px;
    font-weight: 600; font-size: 15px; gap: 10px;
  }
  .history-entries { padding: 0 14px 12px; }
  .history-entries.hidden { display: none; }
  .history-entries li {
    display: flex; gap: 10px; font-size: 13px; color: var(--muted);
    padding: 4px 0; border-top: 1px solid var(--border);
  }
  .history-entries li span:first-child { font-weight: 600; color: var(--text); min-width: 48px; }
  .history-entries li span.protein { color: var(--protein); }
  .history-entries li span:nth-child(2) { flex: 1; }

  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 5;
  }
  .backdrop.hidden { display: none; }
  .settings-panel {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 6;
    background: var(--card); border-radius: 16px 16px 0 0;
    padding: 16px 16px calc(env(safe-area-inset-bottom) + 16px);
  }
  .settings-panel.hidden { display: none; }
  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 16px; font-weight: 700; margin-bottom: 14px;
  }
  .settings-header button { border: none; background: transparent; color: var(--accent); font-size: 16px; font-weight: 600; }
  .settings-panel label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .quick-item-row {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; font-size: 14px; color: var(--text);
  }
  .quick-item-row .qi-info-stats { color: var(--muted); font-size: 12px; }
  .qi-remove { border: none; background: transparent; color: var(--muted); font-size: 18px; width: 28px; height: 28px; flex: 0 0 auto; }
  .qi-add-form { display: flex; gap: 6px; margin-bottom: 16px; }
  .qi-add-form input {
    flex: 1; min-width: 0; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); border-radius: 8px; padding: 10px; font-size: 14px;
  }
  .qi-add-form button { border: none; background: var(--accent); color: #04210c; font-weight: 700; border-radius: 8px; padding: 0 14px; font-size: 14px; }
  .settings-panel input[type=number], .settings-panel input[type=text] {
    display: block; width: 100%; margin-top: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    border-radius: 10px; padding: 12px; font-size: 16px;
  }
  .backup-row { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .backup-status.warn { color: var(--warn); }
  .settings-buttons { display: flex; gap: 10px; }
  .btn {
    flex: 1; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600;
    background: var(--accent); color: #04210c;
  }
  .btn.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn.danger { background: var(--bg); color: var(--danger); border: 1px solid var(--border); }
  .hidden { display: none; }

  .toast {
    position: fixed; left: 16px; right: 16px; bottom: 90px; z-index: 7;
    background: #2a2a2e; border-radius: 12px; padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    transform: translateY(120px); opacity: 0; transition: all .25s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .toast button { border: none; background: transparent; color: var(--accent); font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="tabs">
      <button id="tabToday" class="tab active">Today</button>
      <button id="tabHistory" class="tab">History</button>
    </div>
    <button id="gearBtn" class="icon-btn" aria-label="Settings">&#9881;</button>
  </header>

  <main id="todayView" class="view">
    <div class="backup-banner hidden" id="backupBanner">
      <span id="backupBannerText"></span>
      <button type="button" id="backupBannerBtn">Back Up Now</button>
    </div>
    <div class="total-block">
      <div class="date-label" id="dateLabel">Today</div>
      <div class="total-num" id="totalNum">0</div>
      <div class="total-sub">calories today</div>
      <div class="protein-sub" id="proteinTotal">0g protein today</div>
      <div class="progress-wrap hidden" id="progressWrap">
        <div class="progress-track"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
    </div>
    <ul class="entries-list" id="entriesList"></ul>
  </main>

  <main id="historyView" class="view hidden">
    <ul id="historyList" style="margin-top:14px"></ul>
  </main>

  <div class="bottom-bar" id="bottomBar">
    <div class="quick-items hidden" id="quickItemsRow"></div>
    <form class="add-bar" id="addBar">
      <div class="add-row">
        <input id="calInput" type="number" inputmode="decimal" placeholder="Calories">
        <input id="proteinInput" type="number" inputmode="decimal" placeholder="Protein (g)">
      </div>
      <div class="add-row">
        <input id="nameInput" type="text" placeholder="What (optional)" autocomplete="off">
        <button type="submit">Add</button>
      </div>
    </form>
  </div>
</div>

<div class="backdrop hidden" id="backdrop"></div>

<div class="settings-panel hidden" id="settingsPanel">
  <div class="settings-header"><span>Settings</span><button type="button" id="closeSettings">Done</button></div>
  <label>Daily goal (calories)
    <input id="goalInput" type="number" inputmode="numeric" placeholder="No goal set">
  </label>
  <label>Quick Items
    <div id="quickItemsSettingsList" style="margin-top:8px"></div>
    <div class="qi-add-form">
      <input id="qiName" type="text" placeholder="Name">
      <input id="qiCal" type="number" inputmode="decimal" placeholder="Cal">
      <input id="qiProtein" type="number" inputmode="decimal" placeholder="Protein g">
      <button type="button" id="qiAddBtn">Add</button>
    </div>
  </label>
  <div class="backup-row" id="backupStatus">No backup yet</div>
  <div class="backup-warning-note">Your data lives only on this phone — export a backup regularly. To update the app, just close and reopen it; deleting the home screen icon erases all your data.</div>
  <div class="settings-buttons">
    <button type="button" class="btn" id="exportBtn">Export Backup</button>
    <button type="button" class="btn secondary" id="importBtn">Import Backup</button>
  </div>
  <input type="file" id="fileInput" accept="application/json" class="hidden">
</div>

<div class="settings-panel hidden" id="editPanel">
  <div class="settings-header"><span>Edit Entry</span><button type="button" id="closeEdit">Cancel</button></div>
  <label>Calories
    <input id="editCal" type="number" inputmode="decimal">
  </label>
  <label>Protein (g)
    <input id="editProtein" type="number" inputmode="decimal">
  </label>
  <label>Name
    <input id="editName" type="text" placeholder="Optional">
  </label>
  <div class="settings-buttons">
    <button type="button" class="btn" id="saveEdit">Save</button>
    <button type="button" class="btn danger" id="deleteEditBtn">Delete</button>
  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-msg"></span>
  <button id="undoBtn" type="button">Undo</button>
</div>

<script>
const STORAGE_KEY = 'calorieTrackerData';

function uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// "Today" ends at 2am America/New_York, not midnight, so late-night snacks
// still count toward the day that's ending instead of starting a new one.
function getLogicalDateNY(now) {
  now = now || new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', hour12: false
  }).formatToParts(now);
  const map = {};
  parts.forEach(p => map[p.type] = p.value);
  let hour = parseInt(map.hour, 10);
  if (hour === 24) hour = 0;
  const d = new Date(Number(map.year), Number(map.month) - 1, Number(map.day));
  if (hour < 2) d.setDate(d.getDate() - 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function defaultQuickItems() {
  return [{ id: uuid(), name: 'Protein shake (2%)', calories: 420, protein: 62 }];
}

function defaultState() {
  return {
    currentDay: { date: getLogicalDateNY(), entries: [] },
    history: [],
    settings: { dailyGoal: 3800, goalDefaulted: true, lastBackup: null, quickItems: defaultQuickItems() }
  };
}

// Entries now hold both calories and protein together: {id, calories, protein,
// name, createdAt}. Older shapes are migrated: the very first version stored
// {calories} only; the next stored {type:'calories'|'protein', amount}. Old
// separate protein entries become protein-only combined entries (not merged
// with a calorie entry, since we can't know which pairs went together).
function migrateEntry(e) {
  if (e.type === undefined && typeof e.calories === 'number' && typeof e.protein === 'number') return e;
  if (e.type) {
    return {
      id: e.id,
      calories: e.type === 'calories' ? e.amount : 0,
      protein: e.type === 'protein' ? e.amount : 0,
      name: e.name,
      createdAt: e.createdAt
    };
  }
  return { id: e.id, calories: e.calories || 0, protein: 0, name: e.name, createdAt: e.createdAt };
}

function migrateState(s) {
  s.currentDay.entries = s.currentDay.entries.map(migrateEntry);
  s.history.forEach((day) => { day.entries = day.entries.map(migrateEntry); });
  if (s.settings.dailyGoal == null && !s.settings.goalDefaulted) {
    s.settings.dailyGoal = 3800;
  }
  s.settings.goalDefaulted = true;
  if (!s.settings.quickItems) {
    s.settings.quickItems = defaultQuickItems();
  }
  return s;
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if (!parsed.currentDay || !parsed.history || !parsed.settings) return defaultState();
    return migrateState(parsed);
  } catch (e) {
    return defaultState();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function dayTotals(entries) {
  let calories = 0, protein = 0;
  for (const e of entries) {
    calories += e.calories || 0;
    protein += e.protein || 0;
  }
  return { calories, protein };
}

let state = load();
let pendingDelete = null;
let pendingDeleteTimeout = null;
let editingEntryId = null;
let openPanelEl = null;
let expandedEntries = new Set();

function checkRollover() {
  const logical = getLogicalDateNY();
  if (state.currentDay.date === logical) return;
  if (state.currentDay.entries.length > 0) {
    state.history.unshift({ date: state.currentDay.date, entries: state.currentDay.entries });
  }
  state.currentDay = { date: logical, entries: [] };
  save();
}

function addEntry(e) {
  e.preventDefault();
  checkRollover();
  const calInput = document.getElementById('calInput');
  const proteinInput = document.getElementById('proteinInput');
  const nameInput = document.getElementById('nameInput');
  const calories = parseFloat(calInput.value) || 0;
  const protein = parseFloat(proteinInput.value) || 0;
  if (calories <= 0 && protein <= 0) {
    calInput.classList.add('invalid');
    setTimeout(() => calInput.classList.remove('invalid'), 600);
    return;
  }
  state.currentDay.entries.push({
    id: uuid(),
    calories: Math.round(calories * 10) / 10,
    protein: Math.round(protein * 10) / 10,
    name: nameInput.value.trim(),
    createdAt: Date.now()
  });
  save();
  calInput.value = '';
  proteinInput.value = '';
  nameInput.value = '';
  renderToday();
  calInput.focus();
}

function logQuickItem(item) {
  checkRollover();
  state.currentDay.entries.push({
    id: uuid(),
    calories: item.calories || 0,
    protein: item.protein || 0,
    name: item.name,
    createdAt: Date.now()
  });
  save();
  renderToday();
}

function deleteEntry(id) {
  const idx = state.currentDay.entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const [removed] = state.currentDay.entries.splice(idx, 1);
  pendingDelete = removed;
  save();
  renderToday();
  showUndoToast(removed);
}

function showUndoToast(entry) {
  clearTimeout(pendingDeleteTimeout);
  const toast = document.getElementById('toast');
  const parts = [];
  if (entry.calories) parts.push(`${entry.calories.toLocaleString()} cal`);
  if (entry.protein) parts.push(`${entry.protein.toLocaleString()}g protein`);
  toast.querySelector('.toast-msg').textContent = `Deleted ${parts.join(' + ')}`;
  toast.classList.add('show');
  pendingDeleteTimeout = setTimeout(() => {
    toast.classList.remove('show');
    pendingDelete = null;
  }, 5000);
}

function undoDelete() {
  if (!pendingDelete) return;
  state.currentDay.entries.push(pendingDelete);
  pendingDelete = null;
  clearTimeout(pendingDeleteTimeout);
  document.getElementById('toast').classList.remove('show');
  save();
  renderToday();
}

function openSheet(panelEl) {
  document.getElementById('settingsPanel').classList.add('hidden');
  document.getElementById('editPanel').classList.add('hidden');
  panelEl.classList.remove('hidden');
  document.getElementById('backdrop').classList.remove('hidden');
  openPanelEl = panelEl;
}

function closeSheet() {
  if (openPanelEl) openPanelEl.classList.add('hidden');
  document.getElementById('backdrop').classList.add('hidden');
  openPanelEl = null;
}

function openEdit(id) {
  const entry = state.currentDay.entries.find(e => e.id === id);
  if (!entry) return;
  editingEntryId = id;
  document.getElementById('editCal').value = entry.calories || '';
  document.getElementById('editProtein').value = entry.protein || '';
  document.getElementById('editName').value = entry.name;
  openSheet(document.getElementById('editPanel'));
}

function saveEdit() {
  const entry = state.currentDay.entries.find(e => e.id === editingEntryId);
  if (!entry) { closeSheet(); return; }
  const calInput = document.getElementById('editCal');
  const proteinInput = document.getElementById('editProtein');
  const calories = parseFloat(calInput.value) || 0;
  const protein = parseFloat(proteinInput.value) || 0;
  if (calories <= 0 && protein <= 0) {
    calInput.classList.add('invalid');
    setTimeout(() => calInput.classList.remove('invalid'), 600);
    return;
  }
  entry.calories = Math.round(calories * 10) / 10;
  entry.protein = Math.round(protein * 10) / 10;
  entry.name = document.getElementById('editName').value.trim();
  save();
  renderToday();
  closeSheet();
}

function deleteEditEntry() {
  if (editingEntryId) deleteEntry(editingEntryId);
  closeSheet();
}

function formatHistoryDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}

function renderEntries() {
  const list = document.getElementById('entriesList');
  list.innerHTML = '';
  const entries = [...state.currentDay.entries].sort((a, b) => b.createdAt - a.createdAt);
  if (entries.length === 0) {
    list.innerHTML = '<li class="empty">No entries yet today</li>';
    return;
  }
  for (const entry of entries) {
    const li = document.createElement('li');
    li.className = 'entry';
    const expanded = expandedEntries.has(entry.id);
    if (expanded) li.classList.add('expanded');
    const time = new Date(entry.createdAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const cal = entry.calories || 0;
    const pro = entry.protein || 0;

    let amountHtml;
    if (expanded) {
      amountHtml = cal > 0
        ? `${cal.toLocaleString()}<span class="ea-unit">calories</span>`
        : `<span class="ea-pro">${pro.toLocaleString()}g</span><span class="ea-unit">protein</span>`;
    } else if (cal > 0 && pro > 0) {
      amountHtml = `${cal.toLocaleString()}<span class="ea-pro">+${pro.toLocaleString()}g</span>`;
    } else if (cal > 0) {
      amountHtml = `${cal.toLocaleString()}`;
    } else {
      amountHtml = `<span class="ea-pro">${pro.toLocaleString()}g</span>`;
    }
    const showDetailPro = expanded && cal > 0 && pro > 0;

    li.innerHTML = `
      <div class="entry-row">
        <span class="entry-amount">${amountHtml}</span>
        <span class="entry-name">${escapeHtml(entry.name) || '&mdash;'}</span>
        <span class="entry-time">${time}</span>
        <button class="entry-del" type="button" aria-label="Delete entry">&times;</button>
      </div>
      <div class="entry-detail">
        ${showDetailPro ? `<span class="entry-detail-pro">${pro.toLocaleString()}g protein</span>` : ''}
        <button class="entry-edit" type="button">Edit</button>
      </div>
    `;
    li.querySelector('.entry-del').addEventListener('click', (ev) => { ev.stopPropagation(); deleteEntry(entry.id); });
    li.querySelector('.entry-edit').addEventListener('click', (ev) => { ev.stopPropagation(); openEdit(entry.id); });
    li.querySelector('.entry-row').addEventListener('click', () => toggleExpand(entry.id));
    list.appendChild(li);
  }
}

function toggleExpand(id) {
  if (expandedEntries.has(id)) expandedEntries.delete(id);
  else expandedEntries.add(id);
  renderEntries();
}

function renderToday() {
  document.getElementById('dateLabel').textContent = 'Today · ' + formatHistoryDate(state.currentDay.date);
  const totals = dayTotals(state.currentDay.entries);
  document.getElementById('totalNum').textContent = Math.round(totals.calories).toLocaleString();
  document.getElementById('proteinTotal').textContent = `${Math.round(totals.protein).toLocaleString()}g protein today`;

  const goal = state.settings.dailyGoal;
  const progressWrap = document.getElementById('progressWrap');
  if (goal) {
    progressWrap.classList.remove('hidden');
    const pct = Math.min(totals.calories / goal, 1) * 100;
    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.className = 'progress-bar' + (totals.calories > goal ? ' over' : pct >= 90 ? ' warn' : '');
    const remaining = goal - totals.calories;
    document.getElementById('progressLabel').textContent = remaining >= 0
      ? `${Math.round(remaining).toLocaleString()} left`
      : `${Math.round(-remaining).toLocaleString()} over`;
  } else {
    progressWrap.classList.add('hidden');
  }
  renderBackupBanner();
  renderEntries();
}

function renderBackupBanner() {
  const banner = document.getElementById('backupBanner');
  const hasData = state.currentDay.entries.length > 0 || state.history.length > 0;
  const last = state.settings.lastBackup;
  const days = last ? Math.floor((Date.now() - last) / 86400000) : Infinity;
  if (hasData && days >= 3) {
    banner.classList.remove('hidden');
    document.getElementById('backupBannerText').textContent = last
      ? `No backup in ${days} days — your data only lives on this phone.`
      : `You haven't backed up yet — your data only lives on this phone.`;
  } else {
    banner.classList.add('hidden');
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if (state.history.length === 0) {
    list.innerHTML = '<li class="empty">No past days yet</li>';
    return;
  }
  for (const day of state.history) {
    const totals = dayTotals(day.entries);
    const li = document.createElement('li');
    li.className = 'history-day';
    const header = document.createElement('div');
    header.className = 'history-header';
    const totalsLabel = `${Math.round(totals.calories).toLocaleString()} cal` +
      (totals.protein ? ` · ${Math.round(totals.protein).toLocaleString()}g protein` : '');
    header.innerHTML = `<span>${formatHistoryDate(day.date)}</span><span>${totalsLabel}</span>`;
    const details = document.createElement('ul');
    details.className = 'history-entries hidden';
    details.innerHTML = day.entries
      .slice()
      .sort((a, b) => b.createdAt - a.createdAt)
      .map(e => {
        const cal = e.calories || 0, pro = e.protein || 0;
        let amt;
        if (cal > 0 && pro > 0) amt = `${cal.toLocaleString()}<span class="protein"> +${pro.toLocaleString()}g</span>`;
        else if (cal > 0) amt = `${cal.toLocaleString()}`;
        else amt = `<span class="protein">${pro.toLocaleString()}g</span>`;
        return `<li><span>${amt}</span><span>${escapeHtml(e.name) || '&mdash;'}</span><span>${new Date(e.createdAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}</span></li>`;
      })
      .join('');
    header.addEventListener('click', () => details.classList.toggle('hidden'));
    li.appendChild(header);
    li.appendChild(details);
    list.appendChild(li);
  }
}

function renderBackupStatus() {
  const el = document.getElementById('backupStatus');
  const last = state.settings.lastBackup;
  if (!last) {
    el.textContent = 'No backup yet';
    el.className = 'backup-row warn';
  } else {
    const days = Math.floor((Date.now() - last) / 86400000);
    if (days <= 0) {
      el.textContent = 'Backed up today';
      el.className = 'backup-row';
    } else {
      el.textContent = `Last backup: ${days} day${days === 1 ? '' : 's'} ago`;
      el.className = 'backup-row' + (days >= 7 ? ' warn' : '');
    }
  }
}

function renderQuickItems() {
  const wrap = document.getElementById('quickItemsRow');
  const items = state.settings.quickItems || [];
  wrap.innerHTML = '';
  wrap.classList.toggle('hidden', items.length === 0);
  for (const item of items) {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'quick-item-chip';
    const parts = [];
    if (item.calories) parts.push(`${item.calories.toLocaleString()} cal`);
    if (item.protein) parts.push(`${item.protein.toLocaleString()}g protein`);
    chip.innerHTML = `${escapeHtml(item.name)}<span class="qi-stats">${parts.join(' · ')}</span>`;
    chip.addEventListener('click', () => logQuickItem(item));
    wrap.appendChild(chip);
  }
}

function renderQuickItemsSettings() {
  const list = document.getElementById('quickItemsSettingsList');
  const items = state.settings.quickItems || [];
  list.innerHTML = '';
  if (items.length === 0) {
    list.innerHTML = '<div class="empty" style="padding:8px 0;">No quick items yet</div>';
    return;
  }
  for (const item of items) {
    const parts = [];
    if (item.calories) parts.push(`${item.calories} cal`);
    if (item.protein) parts.push(`${item.protein}g protein`);
    const row = document.createElement('div');
    row.className = 'quick-item-row';
    row.innerHTML = `<span>${escapeHtml(item.name)} <span class="qi-info-stats">(${parts.join(' · ')})</span></span><button type="button" class="qi-remove" aria-label="Remove quick item">&times;</button>`;
    row.querySelector('.qi-remove').addEventListener('click', () => {
      state.settings.quickItems = state.settings.quickItems.filter((i) => i.id !== item.id);
      save();
      renderQuickItemsSettings();
      renderQuickItems();
    });
    list.appendChild(row);
  }
}

function addQuickItem() {
  const nameInput = document.getElementById('qiName');
  const calInput = document.getElementById('qiCal');
  const proteinInput = document.getElementById('qiProtein');
  const name = nameInput.value.trim();
  const calories = parseFloat(calInput.value) || 0;
  const protein = parseFloat(proteinInput.value) || 0;
  if (!name || (!calories && !protein)) return;
  if (!state.settings.quickItems) state.settings.quickItems = [];
  state.settings.quickItems.push({ id: uuid(), name, calories, protein });
  save();
  nameInput.value = '';
  calInput.value = '';
  proteinInput.value = '';
  renderQuickItemsSettings();
  renderQuickItems();
}

function renderAll() {
  renderToday();
  renderHistory();
  renderBackupStatus();
  renderQuickItems();
  renderQuickItemsSettings();
  document.getElementById('goalInput').value = state.settings.dailyGoal || '';
}

async function exportBackup() {
  const data = JSON.stringify(state, null, 2);
  const filename = `calorie-tracker-backup-${state.currentDay.date}.json`;
  const file = new File([data], filename, { type: 'application/json' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Calorie Tracker Backup' });
      markBackedUp();
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }
  }
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  markBackedUp();
}

function markBackedUp() {
  state.settings.lastBackup = Date.now();
  save();
  renderBackupStatus();
  renderBackupBanner();
}

function handleImport(e) {
  const fileInput = e.target;
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed.currentDay || !Array.isArray(parsed.history) || !parsed.settings) {
        throw new Error('Invalid backup file');
      }
      if (!confirm('Replace all current data with this backup? This cannot be undone.')) {
        fileInput.value = '';
        return;
      }
      state = migrateState(parsed);
      checkRollover();
      save();
      renderAll();
    } catch (err) {
      alert('Could not read that backup file.');
    } finally {
      fileInput.value = '';
    }
  };
  reader.readAsText(file);
}

function switchTab(tab) {
  const today = tab === 'today';
  document.getElementById('todayView').classList.toggle('hidden', !today);
  document.getElementById('historyView').classList.toggle('hidden', today);
  document.getElementById('bottomBar').classList.toggle('hidden', !today);
  document.getElementById('tabToday').classList.toggle('active', today);
  document.getElementById('tabHistory').classList.toggle('active', !today);
  if (!today) renderHistory();
}

document.addEventListener('DOMContentLoaded', () => {
  checkRollover();
  renderAll();

  document.getElementById('addBar').addEventListener('submit', addEntry);
  document.getElementById('undoBtn').addEventListener('click', undoDelete);
  document.getElementById('gearBtn').addEventListener('click', () => openSheet(document.getElementById('settingsPanel')));
  document.getElementById('closeSettings').addEventListener('click', closeSheet);
  document.getElementById('closeEdit').addEventListener('click', closeSheet);
  document.getElementById('backdrop').addEventListener('click', closeSheet);
  document.getElementById('saveEdit').addEventListener('click', saveEdit);
  document.getElementById('deleteEditBtn').addEventListener('click', deleteEditEntry);
  document.getElementById('tabToday').addEventListener('click', () => switchTab('today'));
  document.getElementById('tabHistory').addEventListener('click', () => switchTab('history'));

  document.getElementById('goalInput').addEventListener('change', (e) => {
    const v = parseInt(e.target.value, 10);
    state.settings.dailyGoal = (v && v > 0) ? v : null;
    save();
    renderToday();
  });

  document.getElementById('qiAddBtn').addEventListener('click', addQuickItem);

  document.getElementById('backupBannerBtn').addEventListener('click', exportBackup);
  document.getElementById('exportBtn').addEventListener('click', exportBackup);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', handleImport);

  setInterval(() => { checkRollover(); renderToday(); }, 60 * 1000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      checkRollover();
      renderAll();
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});
</script>
</body>
</html>
